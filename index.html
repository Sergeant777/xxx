<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUAD 3D | Action Figure Storyteller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        body { background-color: #020617; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #viewport {
            height: 500px;
            width: 100%;
            background-color: #1e293b;
            position: relative;
            border: 8px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-size: cover;
            background-position: center;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Slide Animation */
        .tutorial-slide {
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 30px;
            height: 500px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Draggable Items */
        .movable {
            position: absolute;
            cursor: move;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            transform-origin: center center;
        }
        .movable.selected {
            outline: 4px dashed #06b6d4;
            outline-offset: 4px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 12px;
        }
        .movable img { 
            max-width: 280px; max-height: 400px; 
            pointer-events: none; 
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
        }

        /* Speech Bubble Appearance */
        .speech-bubble-box {
            background: white; border: 4px solid black; border-radius: 35px;
            padding: 15px 25px; color: black; font-family: 'Bangers', cursive;
            font-size: 1.6rem; text-align: center; text-transform: uppercase;
            box-shadow: 10px 10px 0px rgba(0,0,0,1); min-width: 120px; max-width: 320px;
            position: relative;
        }
        .speech-bubble-box::after {
            content: ''; position: absolute; bottom: -20px; left: 40px;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #onion-skin { position: absolute; inset: 0; z-index: 30; opacity: 0.3; pointer-events: none; display: none; background-size: cover; background-position: center; }
        #playback-overlay { position: absolute; inset: 0; z-index: 200; background: black; display: none; align-items: center; justify-content: center; }
        
        .timeline-thumb { 
            width: 110px; aspect-ratio: 4/5; border: 4px solid #0f172a; 
            border-radius: 15px; flex-shrink: 0; overflow: hidden; 
            position: relative; background: #1e293b; transition: all 0.2s;
        }
        .timeline-thumb.active { border-color: #06b6d4; transform: scale(1.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .tab-btn.active { background: #06b6d4; color: black; border-color: #06b6d4; }

        .social-btn { background: #1877F2; transition: all 0.2s; }
        .social-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .action-pack-btn {
            background: #FFD700; color: black;
            box-shadow: 0 6px 0px #B8860B; transition: all 0.1s;
        }
        .action-pack-btn:active { transform: translateY(3px); box-shadow: 0 3px 0px #B8860B; }

        .control-section {
            background: rgba(0,0,0,0.25); padding: 1.25rem;
            border-radius: 1.75rem; border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="p-4" onload="init()">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar Navigation & Controls -->
        <div class="lg:col-span-3 flex flex-col gap-4 bg-slate-900 p-5 rounded-[45px] border border-slate-800 shadow-2xl h-fit">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black text-2xl italic font-comic">S</div>
                    <h2 class="text-2xl font-black italic text-white font-comic uppercase tracking-tight">SQUAD 3D</h2>
                </div>
                <a href="https://www.facebook.com/share/1JQh5fGJiB/" target="_blank" class="text-sky-400 hover:text-white transition-colors">
                    <i data-lucide="facebook" class="w-6 h-6"></i>
                </a>
            </div>

            <div class="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-slate-800">
                <button onclick="switchTab('studio')" id="tab-btn-studio" class="tab-btn active flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all flex items-center justify-center gap-2">
                    <i data-lucide="clapperboard" class="w-3.5 h-3.5"></i> Studio
                </button>
                <button onclick="switchTab('guide')" id="tab-btn-guide" class="tab-btn flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all flex items-center justify-center gap-2">
                    <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> How-To
                </button>
            </div>

            <!-- Studio Interface -->
            <div id="sidebar-studio" class="space-y-4">
                <div class="control-section space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400 flex items-center gap-2"><i data-lucide="image" class="w-3.5 h-3.5"></i> 1. Scene</h3>
                    <button onclick="triggerUpload('bg')" class="w-full bg-slate-800 py-2.5 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all">Upload Background</button>
                </div>

                <div class="control-section space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400 flex items-center gap-2"><i data-lucide="users" class="w-3.5 h-3.5"></i> 2. Figures</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="triggerUpload('charA')" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all flex flex-col items-center gap-1">
                            <span class="text-cyan-400">Figure A</span>
                        </button>
                        <button onclick="triggerUpload('charB')" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500 transition-all flex flex-col items-center gap-1">
                            <span class="text-emerald-400">Figure B</span>
                        </button>
                    </div>
                </div>

                <div class="control-section space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400 flex items-center gap-2"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> 3. Dialogue</h3>
                    <div class="flex gap-2">
                        <input id="speech-input" type="text" placeholder="HEY!" class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-3 py-2.5 text-xs font-black uppercase text-white outline-none focus:border-cyan-500">
                        <button onclick="addSpeechBubble()" class="bg-cyan-600 px-5 rounded-xl font-black text-xl hover:bg-cyan-500 transition-all">+</button>
                    </div>
                </div>

                <div class="control-section space-y-3">
                    <div class="flex gap-2">
                        <button onclick="flipSelected()" class="flex-1 bg-slate-800 p-2.5 rounded-xl hover:bg-slate-700 border border-slate-700 transition-all"><i data-lucide="flip-horizontal" class="w-4 h-4 mx-auto"></i></button>
                        <button onclick="deleteSelected()" class="flex-1 bg-red-900/20 text-red-500 p-2.5 rounded-xl border border-red-900/50 hover:bg-red-900/40 transition-all"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                    </div>
                    <input type="range" id="size-slider" min="0.2" max="3" step="0.1" value="1" oninput="updateSelectedScale(this.value)" class="w-full accent-cyan-500">
                </div>

                <button onclick="snapFrame()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-3xl text-xl font-black uppercase shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="camera" class="w-7 h-7"></i> SNAP FRAME
                </button>
            </div>

            <!-- Guide Interface -->
            <div id="sidebar-guide" class="hidden space-y-4">
                <div class="control-section">
                    <p class="text-[11px] text-slate-300 font-bold uppercase leading-relaxed text-center italic">
                        Follow the direct mission on the right to become a SQUAD 3D master!
                    </p>
                </div>
                <button onclick="switchTab('studio')" class="w-full bg-cyan-500 text-black py-4 rounded-3xl font-black uppercase shadow-lg hover:brightness-110 transition-all">Back to Studio</button>
            </div>

            <!-- Social Footer -->
            <div class="pt-4 border-t border-slate-800 mt-auto">
                <a href="https://www.facebook.com/share/1JQh5fGJiB/" target="_blank" class="social-btn flex items-center justify-center gap-3 w-full py-4 rounded-2xl text-[11px] font-black uppercase text-white shadow-xl">
                    <i data-lucide="facebook" class="w-5 h-5"></i> JOIN THE SQUAD!
                </a>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="lg:col-span-9 space-y-4">
            
            <!-- Studio Workspace -->
            <div id="content-studio" class="tab-content active space-y-4">
                <div id="viewport" onpointerdown="handleStageDown(event)">
                    <div id="onion-skin"></div>
                    <div id="playback-overlay"><img id="playback-img" src="" class="max-w-full max-h-full"></div>
                    <div id="item-layer"></div>
                    <div class="absolute bottom-6 left-6 flex items-center gap-2 bg-black/70 px-4 py-2 rounded-full border border-white/10 z-[60]">
                        <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                        <span id="frame-count" class="text-[11px] font-black uppercase text-white tracking-widest">0 Frames</span>
                    </div>
                    <div class="absolute bottom-8 right-10 opacity-15 font-black italic text-7xl text-white pointer-events-none uppercase font-comic">SQUAD 3D</div>
                </div>

                <!-- Animation Reel -->
                <div class="bg-slate-900 border border-slate-800 rounded-[55px] p-8 shadow-2xl">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-5 mb-6">
                        <div class="flex items-center gap-5">
                            <button id="play-btn" onclick="togglePlay()" class="bg-emerald-500 text-black px-10 py-3.5 rounded-2xl font-black uppercase flex items-center gap-3 shadow-lg active:scale-95 transition-all">
                                <i data-lucide="play" id="play-icon" class="w-5 h-5 fill-current"></i> <span>WATCH FILM</span>
                            </button>
                            <div class="flex flex-col">
                                <input type="range" min="1" max="12" value="4" class="w-28 accent-emerald-500" id="fps-slider">
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest text-center mt-1">Playback Speed</span>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="resetEverything()" class="text-[11px] font-black text-red-500 uppercase px-5 py-2.5 hover:bg-red-500/10 rounded-xl transition-all">Reset Studio</button>
                            <button onclick="downloadFrames()" class="bg-slate-800 px-6 py-2.5 rounded-xl text-[11px] font-black uppercase border border-slate-700 flex items-center gap-2 transition-all hover:text-white">
                                <i data-lucide="download" class="w-4 h-4"></i> Export PNGs
                            </button>
                        </div>
                    </div>
                    <div id="timeline" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide min-h-[160px]">
                        <div id="empty-msg" class="w-full py-14 text-center border-4 border-dashed border-slate-800 rounded-[40px] opacity-25 uppercase font-black italic text-sm text-slate-400">Snap a frame to begin your story!</div>
                    </div>
                </div>
            </div>

            <!-- Guide Workspace -->
            <div id="content-guide" class="tab-content space-y-6">
                <div id="guide-slider" class="tutorial-slide relative">
                    <!-- Slides injected via JavaScript -->
                </div>
                <div class="flex justify-center gap-6">
                    <button onclick="prevSlide()" class="bg-slate-800 p-5 rounded-full border border-slate-700 hover:border-cyan-500 transition-all"><i data-lucide="chevron-left"></i></button>
                    <div id="slide-dots" class="flex items-center gap-3"></div>
                    <button onclick="nextSlide()" class="bg-slate-800 p-5 rounded-full border border-slate-700 hover:border-cyan-500 transition-all"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>

        </div>
    </div>

    <input id="file-upload" type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
    <canvas id="snap-canvas" class="hidden"></canvas>

    <script>
        const MISSION_SLIDES = [
            { title: "🎬 DIRECT YOUR STORY", text: "Turn your physical Action Figures into digital legends! Follow these steps to build your movie.", icon: "star", color: "text-yellow-400" },
            { 
                title: "🎁 GET THE ACTION PACK", 
                text: "Don't have your own photos yet? Click below to get EPIC characters and backgrounds for FREE!", 
                icon: "package", 
                color: "text-yellow-500",
                isResourceSlide: true
            },
            { title: "📸 STEP 1: SNAP & CUT", text: "Take a photo of your toy. Use the 'Magic Touch' on iPhone (hold your finger on the toy in your gallery) to remove the background!", icon: "wand-2", color: "text-cyan-400" },
            { title: "🚀 STEP 2: LOAD STUDIO", text: "Upload your cutout to 'Figure A'. It becomes a digital sticker you can move anywhere!", icon: "upload", color: "text-purple-400" },
            { title: "🎭 STEP 3: ANIMATE", text: "Move your characters a tiny bit, add a speech bubble, and hit SNAP FRAME. Repeat for a movie!", icon: "clapperboard", color: "text-red-400" },
            { title: "📱 JOIN THE SQUAD!", text: "Love the studio? Click below to follow us on Facebook for more animator packs and community updates!", icon: "facebook", color: "text-blue-400", isSocialSlide: true }
        ];

        let currentSlideIdx = 0;
        let selectedEl = null;
        let activePointerId = null;
        let dragOffset = { x: 0, y: 0 };
        let frames = [];
        let isPlaying = false;
        let playInterval = null;
        let zCounter = 100;

        function init() {
            lucide.createIcons();
            renderSlide();
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sidebar-studio').classList.add('hidden');
            document.getElementById('sidebar-guide').classList.add('hidden');
            document.getElementById(`content-${tab}`).classList.add('active');
            document.getElementById(`tab-btn-${tab}`).classList.add('active');
            document.getElementById(`sidebar-${tab}`).classList.remove('hidden');
            lucide.createIcons();
        }

        function renderSlide() {
            const slide = MISSION_SLIDES[currentSlideIdx];
            const container = document.getElementById('guide-slider');
            
            let extraContent = '';
            if (slide.isResourceSlide) {
                extraContent = `
                    <div class="mt-8">
                        <a href="https://drive.google.com/drive/folders/1qkTtlDpseaDDngEzkgs1rQQIyhLg4zux?usp=drive_link" target="_blank" class="action-pack-btn inline-flex items-center gap-3 px-10 py-5 rounded-[30px] font-black uppercase text-2xl shadow-2xl hover:scale-105 transition-all">
                            <i data-lucide="folder-open"></i> OPEN ACTION PACK
                        </a>
                        <p class="text-[10px] text-slate-500 uppercase mt-4 font-black">Find figures & backgrounds here!</p>
                    </div>
                `;
            } else if (slide.isSocialSlide) {
                extraContent = `
                    <a href="https://www.facebook.com/share/1JQh5fGJiB/" target="_blank" class="mt-8 bg-blue-600 px-10 py-5 rounded-[30px] font-black uppercase text-2xl shadow-2xl hover:scale-105 transition-all flex items-center gap-4">
                        <i data-lucide="facebook" class="w-8 h-8"></i> FOLLOW SQUAD 3D
                    </a>
                `;
            }

            container.innerHTML = `
                <div class="mb-8 bg-slate-800 p-10 rounded-full border-4 border-slate-700 shadow-2xl">
                    <i data-lucide="${slide.icon}" class="w-20 h-20 ${slide.color}"></i>
                </div>
                <h1 class="text-5xl font-comic uppercase mb-4 tracking-wider leading-tight">${slide.title}</h1>
                <p class="text-2xl text-slate-300 font-medium max-w-xl leading-relaxed">${slide.text}</p>
                ${extraContent}
            `;

            const dots = document.getElementById('slide-dots');
            dots.innerHTML = MISSION_SLIDES.map((_, i) => 
                `<div class="w-3.5 h-3.5 rounded-full ${i === currentSlideIdx ? 'bg-cyan-500 scale-125' : 'bg-slate-700'} transition-all duration-300"></div>`
            ).join('');
            lucide.createIcons();
        }

        function nextSlide() { currentSlideIdx = (currentSlideIdx + 1) % MISSION_SLIDES.length; renderSlide(); }
        function prevSlide() { currentSlideIdx = (currentSlideIdx - 1 + MISSION_SLIDES.length) % MISSION_SLIDES.length; renderSlide(); }

        let uploadTarget = '';
        function triggerUpload(slot) { uploadTarget = slot; document.getElementById('file-upload').click(); }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                if (uploadTarget === 'bg') {
                    document.getElementById('viewport').style.backgroundImage = `url(${ev.target.result})`;
                } else {
                    createMovableItem(`<img src="${ev.target.result}" draggable="false">`, uploadTarget);
                }
                e.target.value = '';
            };
            r.readAsDataURL(file);
        }

        function createMovableItem(content, id) {
            const container = document.getElementById('item-layer');
            const el = document.createElement('div');
            el.className = "movable";
            el.innerHTML = content;
            el.style.left = "30%"; el.style.top = "20%";
            el.dataset.scale = 1; el.dataset.rotate = 0; el.dataset.flipped = "false";
            el.onpointerdown = (e) => {
                e.stopPropagation(); selectItem(el);
                zCounter++; el.style.zIndex = zCounter;
                activePointerId = e.pointerId;
                const rect = el.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left; dragOffset.y = e.clientY - rect.top;
                el.setPointerCapture(e.pointerId);
            };
            el.ondblclick = () => { if(confirm("Remove item?")) el.remove(); };
            container.appendChild(el);
            selectItem(el);
            applyTransform(el);
        }

        function addSpeechBubble() {
            const val = document.getElementById('speech-input').value;
            if (!val.trim()) return;
            createMovableItem(`<div class="speech-bubble-box">${val}</div>`, 'bubble');
            document.getElementById('speech-input').value = '';
        }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el; selectedEl.classList.add('selected');
            document.getElementById('size-slider').value = el.dataset.scale;
        }

        function handleStageDown() { if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; } }
        function handlePointerMove(e) {
            if (!selectedEl || activePointerId === null || e.pointerId !== activePointerId) return;
            const v = document.getElementById('viewport').getBoundingClientRect();
            selectedEl.style.left = (e.clientX - v.left - dragOffset.x) + 'px';
            selectedEl.style.top = (e.clientY - v.top - dragOffset.y) + 'px';
        }
        function handlePointerUp() { activePointerId = null; }

        function applyTransform(el) {
            const s = el.dataset.scale, r = el.dataset.rotate;
            const f = el.dataset.flipped === "true" ? -1 : 1;
            el.style.transform = `scale(${s * f}, ${s}) rotate(${r}deg)`;
        }
        function updateSelectedScale(v) { if(selectedEl) { selectedEl.dataset.scale = v; applyTransform(selectedEl); } }
        function flipSelected() { if(selectedEl) { selectedEl.dataset.flipped = selectedEl.dataset.flipped === "true" ? "false" : "true"; applyTransform(selectedEl); } }
        function deleteSelected() { if(selectedEl) { selectedEl.remove(); selectedEl = null; } }

        async function snapFrame() {
            if (isPlaying) togglePlay();
            const viewport = document.getElementById('viewport');
            const currentSelected = selectedEl;
            if (selectedEl) selectedEl.classList.remove('selected');
            const canvas = await html2canvas(viewport, { backgroundColor: null, scale: 2 });
            const data = canvas.toDataURL("image/png");
            frames.push(data);
            if (currentSelected) currentSelected.classList.add('selected');
            document.getElementById('onion-skin').style.backgroundImage = `url(${data})`;
            document.getElementById('onion-skin').style.display = 'block';
            document.getElementById('frame-count').innerText = `${frames.length} Frames`;
            const timeline = document.getElementById('timeline');
            const empty = document.getElementById('empty-msg');
            if (empty) empty.remove();
            const thumb = document.createElement('div');
            thumb.className = "timeline-thumb";
            thumb.innerHTML = `<img src="${data}" class="w-full h-full object-cover opacity-70"><div class="absolute bottom-1 right-2 text-[8px] font-black">${frames.length}</div>`;
            timeline.appendChild(thumb);
            timeline.scrollLeft = timeline.scrollWidth;
        }

        function togglePlay() {
            if (frames.length < 1) return;
            isPlaying = !isPlaying;
            const overlay = document.getElementById('playback-overlay');
            const img = document.getElementById('playback-img');
            const fps = document.getElementById('fps-slider').value;
            if (isPlaying) {
                overlay.style.display = 'flex';
                let i = 0;
                playInterval = setInterval(() => { img.src = frames[i]; i = (i + 1) % frames.length; }, 1000 / fps);
            } else {
                clearInterval(playInterval); overlay.style.display = 'none';
            }
        }

        function resetEverything() {
            if(!confirm("Reset Movie?")) return;
            frames = []; document.getElementById('timeline').innerHTML = '';
            document.getElementById('item-layer').innerHTML = '';
            document.getElementById('onion-skin').style.display = 'none';
            document.getElementById('frame-count').innerText = '0 Frames';
            document.getElementById('viewport').style.backgroundImage = 'none';
        }

        function downloadFrames() {
            frames.forEach((f, i) => {
                const a = document.createElement('a');
                a.download = `squad3d_frame_${i+1}.png`; a.href = f; a.click();
            });
        }
    </script>
</body>
</html>
